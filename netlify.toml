[build]
  base      = "app"
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command     = "npm --prefix app run dev"
  targetPort  = 5173
  port        = 8888
  autoLaunch  = false

[build.environment]
  NODE_VERSION = "20"
  # GITHUB_REPO is a public repo name, not a secret — suppress false-positive scan
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_REPO"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
